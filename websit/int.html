<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Camera | Studio Lighting</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #141313;
            overflow: hidden;
            display: flex;
            font-family: 'Inter', sans-serif;
        }

        #info {
            flex: 0 0 30%;
            padding: 60px;
            color: white;
            z-index: 2;
            align-self: center;
        }

        #container {
            flex: 1;
            position: relative;
        }

        #loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #444;
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            font-weight: 800;
            letter-spacing: -2px;
        }

        p {
            color: #666;
            line-height: 1.6;
            font-size: 1.1rem;
        }
    </style>
</head>

<body>

    <div id="info">
        <h1>BLENDER</h1>
        <p>This to Test.<br>Blender in HTML.</p>
    </div>

    <div id="container">
        <div id="loader">CALIBRATING SENSORS...</div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';
        import { RectAreaLightHelper } from 'three/addons/helpers/RectAreaLightHelper.js';

        const container = document.getElementById('container');
        const loaderUI = document.getElementById('loader');

        // 1. Scene & Camera
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(35, container.clientWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1, 8);

        // 2. Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2; // Adjust this if the screen is too white
        container.appendChild(renderer.domElement);

        // 3. Orbit Controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // 4. STUDIO LIGHTING
        // Ambient for base visibility
        scene.add(new THREE.AmbientLight(0xffffff, 0.2));

        // THE "FRONT BRIGHT LIGHT" (Rectangular Softbox)
        // RectAreaLight( color, intensity, width, height )
        const frontLight = new THREE.RectAreaLight(0xffffff, 5, 4, 4);
        frontLight.position.set(0, 0.5, 5); // Right in front of the lens
        frontLight.lookAt(0, 0, 0);
        scene.add(frontLight);

        // Optional: A helper to see where the light is (remove for production)
        // const helper = new RectAreaLightHelper(frontLight);
        // scene.add(helper);

        // 5. HDRI ENVIRONMENT (Reflections)
        new RGBELoader()
            .setPath('https://threejs.org/examples/textures/equirectangular/')
            .load('venice_sunset_1k.hdr', (texture) => {
                texture.mapping = THREE.EquirectangularReflectionMapping;
                scene.environment = texture;
                // scene.background = texture; // Uncomment if you want to see the environment
            });

        // 6. LOAD MODEL
        const loader = new GLTFLoader();
        loader.load('camera.glb', (gltf) => {
            const model = gltf.scene;

            // Auto-Center & Scale
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());

            model.position.sub(center); // Move center to (0,0,0)

            const maxDim = Math.max(size.x, size.y, size.z);
            model.scale.setScalar(3 / maxDim); // Standardize size

            model.traverse((n) => {
                if (n.isMesh) {
                    n.castShadow = true;
                    n.receiveShadow = true;
                    // Boost the shine of the materials
                    if (n.material) {
                        n.material.envMapIntensity = 1.5;
                        // Force the inner lens to be visible through the glass
                        if (n.material.transparent) {
                            n.material.depthWrite = true;
                        }
                    }
                }
            });

            scene.add(model);
            loaderUI.style.display = 'none';
        },
            undefined,
            (err) => {
                loaderUI.innerText = "Error: Check 'camera.glb' filename";
                console.error(err);
            });

        // 7. Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // 8. Handle Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, window.innerHeight);
        });

    </script>
</body>

</html>
